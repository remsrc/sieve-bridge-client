name: Build SieveBridgeClient

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact_name: SieveBridgeClient-windows-x64
            executable_name: SieveBridgeClient.exe

          - name: Linux x64
            os: ubuntu-22.04
            artifact_name: SieveBridgeClient-linux-x64
            executable_name: SieveBridgeClient

          - name: macOS arm64
            os: macos-latest
            artifact_name: SieveBridgeClient-macos-arm64
            executable_name: SieveBridgeClient

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Show environment
        run: |
          python --version
          python -m pip --version

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest pyinstaller

      - name: Run tests
        run: python -m pytest

      - name: Verify entry point
        shell: bash
        run: |
          test -f sieve_bridge_launcher.py
          test -f src/sieve_bridge/host.py
          ls -la src/sieve_bridge

      - name: Build standalone executable
        run: >
          python -m PyInstaller
          --clean
          --noconfirm
          --onefile
          --name SieveBridgeClient
          --paths src
          --collect-all keyring
          --collect-submodules keyring.backends
          sieve_bridge_launcher.py

      - name: Verify build output
        shell: bash
        run: |
          ls -la dist
          test -f "dist/${{ matrix.executable_name }}"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.executable_name }}
          if-no-files-found: error
          retention-days: 14
