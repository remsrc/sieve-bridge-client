name: Build SieveBridgeClient

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
          - os: ubuntu-latest
            artifact: linux-x64
          - os: macos-latest
            artifact: macos-universal

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pyinstaller

      - name: Run tests
        run: |
          python -m pytest

      - name: Build executable
        run: |
          pyinstaller --clean --noconfirm SieveBridgeClient.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SieveBridgeClient-${{ matrix.artifact }}
          path: dist/